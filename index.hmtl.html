                    } else {
                        data = JSON.parse(JSON.stringify(dataDefecto));
                    }
                    
                    // Listener para cambios en tiempo real
                    dbRef.on('value', (snapshot) => {
                        if (snapshot.exists()) {
                            data = snapshot.val();
                            render();
                        }
                    });
                    
                    resolve();
                });
            });
        }

        // Firebase - Guardar datos
        function guardarDatos() {
            firebase.database().ref('pena2026').set(data).catch(error => {
                console.error('Error guardando datos:', error);
            });
        }

        function login(){
            const pass = document.getElementById('passwordInput').value;
            if(pass === '303'){
                isAdmin = true;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('adminBar').classList.remove('hidden');
                document.getElementById('addShowBtn').classList.remove('hidden');
                document.getElementById('addSponsorBtn').classList.remove('hidden');
                document.getElementById('addProveedorBtn').classList.remove('hidden');
                document.getElementById('adminGastosBtn').classList.remove('hidden');
                render();
            } else {
                alert('Contraseña incorrecta');
            }
        }

        function loginAsVoluntario(){
            isAdmin = false;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('adminBar').classList.add('hidden');
            document.getElementById('addShowBtn').classList.add('hidden');
            document.getElementById('addSponsorBtn').classList.add('hidden');
            document.getElementById('addProveedorBtn').classList.add('hidden');
            document.getElementById('adminGastosBtn').classList.add('hidden');
            render();
        }

        function logout(){ isAdmin=false; document.getElementById('mainApp').classList.add('hidden'); document.getElementById('loginScreen').classList.remove('hidden'); }

        function compartirWhatsApp(){
            const link = 'https://pena-2026.netlify.app';
            const mensaje = '🍺 ¡Hola! Les comparto la AGENDA DIGITAL de la PEÑA 2026 🎉\n\nDía: Domingo 7 de junio\nHorario: 13:00 a 18:00 hs\n\n👉 ' + link + '\n\n¡Te esperamos! 🎉';
            window.open('https://wa.me/?text=' + encodeURIComponent(mensaje), '_blank');
        }

        function showTab(tabName){
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
            if(tabName === 'gastos') setTimeout(actualizarGrafico, 200);
        }

        function showStandTab(standId){
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('stand_' + standId).classList.add('active');
            event.target.classList.add('active');
        }

        function render(){
            renderStandTabs();
            renderStands();
            renderShows();
            renderLinks();
            renderSponsors();
            renderProveedores();
            renderGastos();
        }

        function renderStandTabs(){
            let html = '';
            data.stands.forEach(stand => {
                html += '<button class="tab-btn ' + (stand === data.stands[0] ? 'active' : '') + '" onclick="showStandTab(\'' + stand.id + '\')">' + stand.nombre + '</button>';
            });
            document.getElementById('standsTabButtons').innerHTML = html;
        }

        function renderStands(){
            let html = '';
            data.stands.forEach((stand, index) => {
                html += '<div id="stand_' + stand.id + '" class="section ' + (index === 0 ? 'active' : '') + '"><div class="section-title">' + stand.nombre + '</div><div class="stand-card"><div class="stand-info"><label>👤 Encargado:</label>' + (isAdmin ? '<input type="text" value="' + stand.encargado + '" onchange="data.stands.find(s=>s.id==\'' + stand.id + '\').encargado=this.value; guardarDatos();\">' : '<strong>' + (stand.encargado || 'Sin asignar') + '</strong>') + '</div><div class="stand-info"><label>👥 Voluntarios:</label><div class="voluntario-list">' + (stand.voluntarios.length > 0 ? stand.voluntarios.map((v, i) => '<div class="voluntario-item"><span>' + v + '</span>' + (isAdmin ? '<button onclick="eliminarVoluntario(\'' + stand.id + '\', ' + i + ')">Eliminar</button>' : '') + '</div>').join('') : '<div style="color:#999;padding:10px;">Sin voluntarios</div>') + '</div>' + (isAdmin ? '<div class="add-voluntario-group"><select id="sel_' + stand.id + '" onchange="if(this.value) agregarVoluntario(\'' + stand.id + '\', this.value); this.value=\'\'; "><option value="">+ Seleccionar</option>' + voluntariosBase.map(v => '<option value="' + v + '">' + v + '</option>').join('') + '</select><div style="display:grid;grid-template-columns:1fr auto;gap:5px;"><input type="text" id="new_' + stand.id + '" placeholder="Nuevo nombre"><button onclick="agregarVoluntarioNuevo(\'' + stand.id + '\')">Agregar</button></div></div>' : '') + '</div>';
                
                if(stand.link){
                    html += '<div class="stand-info"><a href="' + stand.link + '" target="_blank" class="link-button">📱 WhatsApp</a></div>';
                } else {
                    html += '<div class="insumos-section">';
                    Object.entries(stand.insumos).forEach(([cat, items]) => {
                        html += '<div class="insumo-categoria"><div class="insumo-titulo">' + cat + '</div><div class="insumo-items">' + items.map(item => '<div class="insumo-item">✓ ' + item + '</div>').join('') + '</div></div>';
                    });
                    html += '</div>';
                }
                html += '</div></div>';
            });
            document.getElementById('standsContainer').innerHTML = html;
        }

        function agregarVoluntario(standId, voluntario){
            const stand = data.stands.find(s => s.id === standId);
            if(stand && voluntario && !stand.voluntarios.includes(voluntario)){
                stand.voluntarios.push(voluntario);
                guardarDatos();
            }
        }

        function agregarVoluntarioNuevo(standId){
            const input = document.getElementById('new_' + standId);
            const voluntario = input.value.trim();
            if(voluntario){
                agregarVoluntario(standId, voluntario);
                input.value = '';
            }
        }

        function eliminarVoluntario(standId, index){
            const stand = data.stands.find(s => s.id === standId);
            if(stand){
                stand.voluntarios.splice(index, 1);
                guardarDatos();
            }
        }

        function renderShows(){
            let html = data.shows.map((s,i) => '<div class="sponsor-card">' + (isAdmin ? '<input type="text" value="' + s.nombre + '" onchange="data.shows[' + i + '].nombre=this.value; guardarDatos();" style="width:100%;padding:8px;margin:5px 0;border:1px solid #ddd;border-radius:4px;"><input type="text" value="' + s.telefono + '" onchange="data.shows[' + i + '].telefono=this.value; guardarDatos();" placeholder="Teléfono" style="width:100%;padding:8px;margin:5px 0;border:1px solid #ddd;border-radius:4px;"><input type="text" value="' + s.instagram + '" onchange="data.shows[' + i + '].instagram=this.value; guardarDatos();" placeholder="Instagram" style="width:100%;padding:8px;margin:5px 0;border:1px solid #ddd;border-radius:4px;"><button onclick="data.shows.splice(' + i + ',1);guardarDatos()" style="background:#d32f2f;color:white;padding:5px 10px;border:none;border-radius:4px;cursor:pointer;width:100%">Eliminar</button>' : '<strong>' + s.nombre + '</strong><br>📞 ' + s.telefono + '<br>📸 ' + s.instagram) + '</div>').join('');
            document.getElementById('showsList').innerHTML = html;
        }

        function renderLinks(){
            let html = '<div style="display:grid;gap:10px;">';
            Object.entries(data.links).forEach(([stand, link]) => {
                const standData = data.stands.find(s => s.id === stand);
                html += '<div class="sponsor-card"><strong>' + (standData?.nombre || stand) + '</strong><br><a href="' + link + '" target="_blank" class="link-button">📱 Grupo</a></div>';
            });
            html += '</div>';
            document.getElementById('linksList').innerHTML = html;
        }

        function renderSponsors(){
            let html = data.sponsors.map((s,i) => '<div class="sponsor-card">' + (isAdmin ? '<input type="text" value="' + s.nombre + '" onchange="data.sponsors[' + i + '].nombre=this.value; guardarDatos();" placeholder="Nombre" style="width:100%;padding:8px;margin:5px 0;border:1px solid #ddd;border-radius:4px;"><input type="text" value="' + s.telefono + '" onchange="data.sponsors[' + i + '].telefono=this.value; guardarDatos();" placeholder="Teléfono" style="width:100%;padding:8px;margin:5px 0;border:1px solid #ddd;border-radius:4px;"><input type="text" value="' + s.dona + '" onchange="data.sponsors[' + i + '].dona=this.value; guardarDatos();" placeholder="¿Qué dona?" style="width:100%;padding:8px;margin:5px 0;border:1px solid #ddd;border-radius:4px;"><button onclick="data.sponsors.splice(' + i + ',1);guardarDatos()" style="background:#d32f2f;color:white;padding:5px 10px;border:none;border-radius:4px;cursor:pointer;width:100%">Eliminar</button>' : '<strong>' + s.nombre + '</strong><br>📞 ' + s.telefono + '<br>🎁 ' + s.dona) + '</div>').join('');
            document.getElementById('sponsorsList').innerHTML = html;
        }

        function renderProveedores(){
            let html = data.proveedores.map((p,i) => '<div class="sponsor-card">' + (isAdmin ? '<input type="text" value="' + p.nombre + '" onchange="data.proveedores[' + i + '].nombre=this.value; guardarDatos();" placeholder="Nombre" style="width:100%;padding:8px;margin:5px 0;border:1px solid #ddd;border-radius:4px;"><input type="text" value="' + p.telefono + '" onchange="data.proveedores[' + i + '].telefono=this.value; guardarDatos();" placeholder="Teléfono" style="width:100%;padding:8px;margin:5px 0;border:1px solid #ddd;border-radius:4px;"><input type="text" value="' + p.compro + '" onchange="data.proveedores[' + i + '].compro=this.value; guardarDatos();" placeholder="¿Qué compró?" style="width:100%;padding:8px;margin:5px 0;border:1px solid #ddd;border-radius:4px;"><button onclick="data.proveedores.splice(' + i + ',1);guardarDatos()" style="background:#d32f2f;color:white;padding:5px 10px;border:none;border-radius:4px;cursor:pointer;width:100%">Eliminar</button>' : '<strong>' + p.nombre + '</strong><br>📞 ' + p.telefono + '<br>📦 ' + p.compro) + '</div>').join('');
            document.getElementById('proveedoresList').innerHTML = html;
        }

        function renderGastos(){
            let totalGastos = 0, totalDonaciones = 0, totalIngresos = 0;
            data.gastos.forEach(g => {
                if(g.tipo === 'Gasto') totalGastos += parseFloat(g.monto) || 0;
                else if(g.tipo === 'Donación') totalDonaciones += parseFloat(g.monto) || 0;
                else if(g.tipo === 'Ingreso') totalIngresos += parseFloat(g.monto) || 0;
            });

            let totalEgresos = totalGastos + totalDonaciones;
            let diferencia = totalIngresos - totalEgresos;
            let html = '<div class="gasto-resumen"><h2 style="text-align:center;margin-bottom:15px;color:var(--dark);">RESUMEN FINANCIERO</h2>';
            html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:0;">';
            html += '<div style="background:#ffebee;padding:10px;border-radius:6px;text-align:center;border: 2px solid #d32f2f;"><div style="color:#d32f2f;font-size:0.9em;font-weight:bold;margin:0;">ENTRADA</div><div style="color:#d32f2f;font-size:1.4em;font-weight:bold;margin:5px 0 0 0;">$' + totalIngresos.toFixed(2) + '</div></div>';
            html += '<div style="background:#e3f2fd;padding:10px;border-radius:6px;text-align:center;border: 2px solid #1976d2;"><div style="color:#1976d2;font-size:0.9em;font-weight:bold;margin:0;">SALIDA</div><div style="color:#1976d2;font-size:1.4em;font-weight:bold;margin:5px 0 0 0;">$' + totalEgresos.toFixed(2) + '</div></div>';
            let colorDif = diferencia >= 0 ? '#4caf50' : '#ff6b6b';
            html += '<div style="background:' + (diferencia >= 0 ? '#e8f5e9' : '#ffebee') + ';padding:10px;border-radius:6px;text-align:center;border: 2px solid ' + colorDif + ';"><div style="color:' + colorDif + ';font-size:0.9em;font-weight:bold;margin:0;">DIFERENCIA</div><div style="color:' + colorDif + ';font-size:1.4em;font-weight:bold;margin:5px 0 0 0;">$' + diferencia.toFixed(2) + '</div></div>';
            html += '</div></div>';

            html += '<h3 style="margin-top:20px;margin-bottom:10px;color:var(--dark);">📋 Detalle Completo</h3>';
            html += '<div style="background:white;padding:15px;border-radius:6px;overflow-x:auto;">';
            if(data.gastos.length > 0){
                html += '<div style="display:grid;grid-template-columns:1.5fr 1.2fr 1.2fr 1fr 1fr 80px;gap:8px;font-weight:bold;margin-bottom:10px;padding-bottom:10px;border-bottom:2px solid var(--gold);font-size:0.9em;"><div>Concepto</div><div>Persona</div><div>Categoría</div><div>Monto</div><div>Tipo</div><div></div></div>';
                data.gastos.forEach((g, i) => {
                    const icono = g.tipo === 'Gasto' ? '📉' : g.tipo === 'Donación' ? '🎁' : '📈';
                    html += '<div class="gasto-item"><div><strong>' + g.concepto + '</strong></div><div>' + g.persona + '</div><div>' + g.categoria + '</div><div style="font-weight:bold;color:var(--gold);">$' + g.monto + '</div><div>' + icono + ' ' + g.tipo + '</div><div>' + (isAdmin ? '<button onclick="eliminarMovimiento(' + i + ')">✕</button>' : '') + '</div></div>';
                });
            } else {
                html += '<div style="color:#999;text-align:center;padding:15px;">Sin movimientos registrados</div>';
            }
            html += '</div>';

            html += '<div class="chart-wrapper"><canvas id="graficoGastos"></canvas></div>';

            document.getElementById('gastosContent').innerHTML = html;
            setTimeout(actualizarGrafico, 100);
        }

        function agregarGasto(){
            const concepto = document.getElementById('gastoConcepto').value;
            const persona = document.getElementById('gastoPersona').value;
            const categoria = document.getElementById('gastoCategoria').value;
            const tipo = document.getElementById('gastoTipo').value;
            const monto = document.getElementById('gastoMonto').value;

            if(concepto && persona && categoria && monto){
                data.gastos.push({concepto, persona, categoria, tipo, monto});
                document.getElementById('gastoConcepto').value = '';
                document.getElementById('gastoPersona').value = '';
                document.getElementById('gastoCategoria').value = '';
                document.getElementById('gastoMonto').value = '';
                guardarDatos();
            } else {
                alert('⚠️ Completa TODOS los campos');
            }
        }

        function eliminarMovimiento(index){
            if(confirm('¿Eliminar este movimiento?')){
                data.gastos.splice(index, 1);
                guardarDatos();
            }
        }

        function actualizarGrafico(){
            const gastoPorCategoria = {};
            data.gastos.forEach(g => {
                if(!gastoPorCategoria[g.categoria]) gastoPorCategoria[g.categoria] = 0;
                if(g.tipo === 'Gasto' || g.tipo === 'Donación') gastoPorCategoria[g.categoria] += parseFloat(g.monto) || 0;
            });

            const ctx = document.getElementById('graficoGastos');
            if(!ctx) return;

            if(gastoChart) {
                gastoChart.destroy();
                gastoChart = null;
            }

            gastoChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(gastoPorCategoria).length > 0 ? Object.keys(gastoPorCategoria) : ['Sin datos'],
                    datasets: [{
                        data: Object.values(gastoPorCategoria).length > 0 ? Object.values(gastoPorCategoria) : [0],
                        backgroundColor: ['#FF6B6B', '#4ECDC4', '#FFE66D', '#FF9F43', '#A8E6CF', '#FFD3B6', '#FFAAA5', '#FF8B94'],
                        borderColor: '#fff',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { 
                            position: 'bottom',
                            labels: { 
                                padding: 15, 
                                font: { size: 11, weight: 'bold' },
                                usePointStyle: true,
                                pointStyle: 'circle'
                            } 
                        },
                        tooltip: { 
                            callbacks: { 
                                label: function(context){ 
                                    return context.label + ': $' + context.parsed.toFixed(2); 
                                } 
                            } 
                        }
                    }
                }
            });
        }

        function addShow(){
            data.shows.push({ nombre: document.getElementById('newShowName').value, telefono: document.getElementById('newShowPhone').value, instagram: document.getElementById('newShowInsta').value });
            document.getElementById('newShowName').value = '';
            document.getElementById('newShowPhone').value = '';
            document.getElementById('newShowInsta').value = '';
            guardarDatos();
        }

        function addSponsor(){
            data.sponsors.push({ nombre: document.getElementById('newSponsorName').value, telefono: document.getElementById('newSponsorPhone').value, dona: document.getElementById('newSponsorDona').value });
            document.getElementById('newSponsorName').value = '';
            document.getElementById('newSponsorPhone').value = '';
            document.getElementById('newSponsorDona').value = '';
            guardarDatos();
        }

        function addProveedor(){
            data.proveedores.push({ nombre: document.getElementById('newProveedorName').value, telefono: document.getElementById('newProveedorPhone').value, compro: document.getElementById('newProveedorCompro').value });
            document.getElementById('newProveedorName').value = '';
            document.getElementById('newProveedorPhone').value = '';
            document.getElementById('newProveedorCompro').value = '';
            guardarDatos();
        }

        // Inicializar
        cargarDatos().then(() => {
            if(Object.keys(data).length === 0) {
                data = JSON.parse(JSON.stringify(dataDefecto));
                guardarDatos();
            }
            render();
        });
    </script>
</body>
</html>
